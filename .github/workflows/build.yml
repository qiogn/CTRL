name: STM32 Build and Test

on:
  push:
    branches: [ master, main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

env:
  BUILD_TYPE: Debug

jobs:
  build-cmake:
    name: Build with CMake
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install ARM GCC toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi
        arm-none-eabi-gcc --version

    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.22.x'

    - name: Configure CMake
      run: |
        cmake -S . -B build-${{ matrix.build-type }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

    - name: Build with CMake
      run: |
        cmake --build build-${{ matrix.build-type }} --parallel 4
        echo "Build completed successfully"

    - name: Check binary size
      run: |
        if [ -f "build-${{ matrix.build-type }}/CTRL.elf" ]; then
          size build-${{ matrix.build-type }}/CTRL.elf
        fi

    - name: Archive build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: cmake-build-${{ matrix.build-type }}
        path: |
          build-${{ matrix.build-type }}/CTRL.elf
          build-${{ matrix.build-type }}/CTRL.map
        retention-days: 7

  build-keil-simulation:
    name: Keil Build Simulation
    runs-on: windows-latest
    needs: build-cmake
    if: false  # Disabled by default - requires Keil license

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Keil build simulation
      run: |
        # This simulates Keil build by checking project files
        # Actual Keil build requires licensed uVision installation
        echo "Checking Keil project files..."
        if (Test-Path "MDK-ARM/CTRL.uvprojx") {
          echo "✓ Keil project file found"
        } else {
          echo "✗ Keil project file not found"
          exit 1
        }
        echo "Keil build simulation completed (actual build requires uVision)"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-cmake

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem \
          --suppress=unmatchedSuppression \
          --language=c --std=c11 \
          -I Core/Inc \
          -I Drivers/STM32F1xx_HAL_Driver/Inc \
          -I Drivers/CMSIS/Device/ST/STM32F1xx/Include \
          -I Drivers/CMSIS/Include \
          Core/Src/ 2> cppcheck-results.txt || true

        # Display results
        if [ -f "cppcheck-results.txt" ]; then
          echo "=== cppcheck Results ==="
          cat cppcheck-results.txt
          echo "========================"
        fi

    - name: Upload analysis results
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis
        path: cppcheck-results.txt
        retention-days: 7

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check README exists
      run: |
        if [ -f "README.md" ]; then
          echo "✓ README.md found"
          echo "Word count: $(wc -w < README.md)"
        else
          echo "✗ README.md not found"
          exit 1
        fi

    - name: Check for large files
      run: |
        echo "Checking for large files (>10MB)..."
        find . -type f -size +10M ! -path "./.git/*" | while read file; do
          echo "Large file: $file ($(du -h "$file" | cut -f1))"
        done

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cmake, static-analysis, documentation]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*.elf
          **/*.map
          **/*.hex
        generate_release_notes: true
        prerelease: false